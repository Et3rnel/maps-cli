name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_NAME: maps-cli
  TARGET: x86_64-unknown-linux-gnu
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build Linux release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Cache cargo registry and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ env.TARGET }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.TARGET }}-cargo-

      - name: Run checks
        run: make check

      - name: Build release binary
        run: cargo build --release --target "$TARGET"

      - name: Package release assets
        run: |
          mkdir -p dist
          cp "target/$TARGET/release/$BINARY_NAME" "dist/$BINARY_NAME-linux-amd64"
          chmod +x "dist/$BINARY_NAME-linux-amd64"
          tar -C dist -czf "dist/$BINARY_NAME-linux-amd64.tar.gz" "$BINARY_NAME-linux-amd64"
          sha256sum "dist/$BINARY_NAME-linux-amd64" "dist/$BINARY_NAME-linux-amd64.tar.gz" > "dist/$BINARY_NAME-linux-amd64.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maps-cli-linux-amd64
          path: |
            dist/maps-cli-linux-amd64
            dist/maps-cli-linux-amd64.tar.gz
            dist/maps-cli-linux-amd64.sha256

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/maps-cli-linux-amd64
            dist/maps-cli-linux-amd64.tar.gz
            dist/maps-cli-linux-amd64.sha256
